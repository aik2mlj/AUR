name: Check and Update AUR Packages

on:
  # Run daily at 00:00 UTC
  schedule:
    - cron: '0 0 * * *'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commits or pushes)'
        required: false
        default: false
        type: boolean
      package:
        description: 'Specific package to update (leave empty for all)'
        required: false
        default: ''
        type: string

concurrency:
  group: aur-auto-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-updates: 
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_updates: ${{ steps.check.outputs.has_updates }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install nvchecker
        run: pip install nvchecker httpx[http2]

      - name: Check for updates
        id: check
        run: |
          # Run nvchecker
          nvchecker -c nvchecker.toml

          # Get updates
          UPDATES=$(nvcmp -c nvchecker.toml 2>/dev/null || true)

          if [[ -z "$UPDATES" ]]; then
            echo "No updates found"
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo 'matrix={"include":[]}' >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Updates found:"
          echo "$UPDATES"
          echo "has_updates=true" >> $GITHUB_OUTPUT

          # Build matrix JSON
          MATRIX='{"include":['
          FIRST=true

          while IFS= read -r line; do
            [[ -z "$line" ]] && continue

            PKG=$(echo "$line" | awk '{print $1}')
            OLD_VER=$(echo "$line" | awk '{print $2}')
            NEW_VER=$(echo "$line" | awk '{print $NF}')

            # Filter by specific package if requested
            if [[ -n "${{ github.event.inputs.package }}" && "$PKG" != "${{ github.event.inputs.package }}" ]]; then
              continue
            fi

            if [[ "$FIRST" != "true" ]]; then
              MATRIX="$MATRIX,"
            fi
            MATRIX="$MATRIX{\"package\":\"$PKG\",\"old_version\":\"$OLD_VER\",\"new_version\":\"$NEW_VER\"}"
            FIRST=false
          done <<< "$UPDATES"

          MATRIX="$MATRIX]}"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Save new versions
        if: steps.check.outputs.has_updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: version-files
          path: new_ver.json

  update-package:
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      max-parallel: 1  # Run sequentially to avoid git conflicts
      matrix: ${{ fromJson(needs.check-updates.outputs.matrix) }}

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git openssh jq curl pacman-contrib sudo

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download new_ver.json
        uses: actions/download-artifact@v4
        with:
          name: version-files
          path: .

      - name: Configure git
        run: |
          git config --global user.name "${{ secrets.AUR_USERNAME }}"
          git config --global user.email "${{ secrets.AUR_EMAIL }}"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up SSH for AUR
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"

          # Robust known_hosts: scan both key types and hash hostnames
          ssh-keyscan -H -t ed25519,rsa aur.archlinux.org >> "$HOME/.ssh/known_hosts" 2>/dev/null
          chmod 644 "$HOME/.ssh/known_hosts"

          # Optional config (not strictly needed when using GIT_SSH_COMMAND)
          cat >> "$HOME/.ssh/config" <<'SSHEOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          SSHEOF
          chmod 600 "$HOME/.ssh/config"

      - name: Update PKGBUILD
        working-directory: ${{ matrix.package }}
        run: |
          echo "Updating ${{ matrix.package }} from ${{ matrix.old_version }} to ${{ matrix.new_version }}"

          # Special handling for sparta-plugins-bin
          if [[ "${{ matrix.package }}" == "sparta-plugins-bin" ]]; then
            RELEASE_INFO=$(curl -s "https://api.github.com/repos/leomccormack/SPARTA/releases/latest")
            ASSET_NAME=$(echo "$RELEASE_INFO" | jq -r '.assets[].name' | grep -E '^Linux_SPARTA_VST3_' | head -1)
            if [[ -n "$ASSET_NAME" ]]; then
              LONG_VERSION=$(echo "$ASSET_NAME" | sed -E 's/Linux_SPARTA_VST3_(.*)\.zip/\1/')
              echo "Detected long version: $LONG_VERSION"
              sed -i "s/^_long_pkgver=.*/_long_pkgver=$LONG_VERSION/" PKGBUILD
            fi
          else
            sed -i "s/^pkgver=.*/pkgver=${{ matrix.new_version }}/" PKGBUILD
          fi

          # Reset pkgrel
          sed -i 's/^pkgrel=.*/pkgrel=1/' PKGBUILD

          # Give builder user ownership for makepkg operations
          chown -R builder:builder .

          # Update checksums (must run as non-root)
          echo "Updating checksums..."
          sudo -u builder updpkgsums

          # Generate .SRCINFO (must run as non-root)
          echo "Regenerating .SRCINFO..."
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

          echo "Dry-running makepkg to validate build..."
          sudo -u builder makepkg --syncdeps --noconfirm --nobuild

          echo "PKGBUILD updated successfully"

      - name: Commit changes
        run: |
          cd "$GITHUB_WORKSPACE"
          git add "${{ matrix.package }}/PKGBUILD" "${{ matrix.package }}/.SRCINFO"
          git commit -m "${{ matrix.package }}: update to ${{ matrix.new_version }}"

      - name: Push to AUR using git subtree
        env:
          GIT_SSH_COMMAND: "ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
        run: |
          PKG="${{ matrix.package }}"
          AUR_REMOTE="ssh://aur@aur.archlinux.org/${PKG}.git"

          # Compute the commit subtree push would produce for this package.
          SPLIT=$(git subtree split --prefix="$PKG")

          # Fetch AUR master so we can reason about ancestry locally.
          # Tolerate a missing/empty remote (first-ever push to a new AUR repo).
          AUR_HEAD=""
          if git fetch "$AUR_REMOTE" master 2>/dev/null; then
            AUR_HEAD=$(git rev-parse FETCH_HEAD 2>/dev/null || true)
          fi

          if [[ -z "$AUR_HEAD" ]]; then
            echo "AUR has no master yet — pushing $SPLIT as initial"
            git push "$AUR_REMOTE" "$SPLIT:master"
          elif [[ "$AUR_HEAD" == "$SPLIT" ]]; then
            echo "AUR already at $SPLIT — skipping push (idempotent)"
          elif git merge-base --is-ancestor "$AUR_HEAD" "$SPLIT"; then
            echo "Pushing $PKG to AUR ($AUR_HEAD -> $SPLIT)..."
            git push "$AUR_REMOTE" "$SPLIT:master"
            echo "Successfully pushed $PKG to AUR"
          else
            echo "ERROR: AUR master ($AUR_HEAD) is not an ancestor of local split ($SPLIT)." >&2
            echo "AUR has diverged from this repo. Manual reconciliation needed:" >&2
            echo "  git subtree pull --prefix=$PKG $AUR_REMOTE master" >&2
            echo "  git push origin main" >&2
            echo "Then re-run this workflow." >&2
            exit 1
          fi

      - name: Track new version and push to GitHub
        run: |
          cd "$GITHUB_WORKSPACE"
          PKG="${{ matrix.package }}"

          # Pull commits from prior matrix entries
          git pull --rebase origin main

          # Merge this package's entry from new_ver.json into old_ver.json.
          # Failed matrix entries skip this step, so their old_ver.json
          # entries stay stale and correctly retry on the next run.
          NEW_ENTRY=$(jq -c --arg pkg "$PKG" '.data[$pkg] // empty' new_ver.json)
          if [[ -z "$NEW_ENTRY" ]]; then
            echo "ERROR: $PKG not found in new_ver.json — refusing to overwrite tracking with null" >&2
            exit 1
          fi
          jq --arg pkg "$PKG" --argjson entry "$NEW_ENTRY" \
            '.data[$pkg] = $entry' old_ver.json > old_ver.json.tmp
          mv old_ver.json.tmp old_ver.json

          git add old_ver.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: track $PKG ${{ matrix.new_version }}"
          fi

          git push origin HEAD:main
